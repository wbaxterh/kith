[project]
name = "kith-runtime-pipecat"
version = "0.0.0"
description = "Python sidecar for @kith/runtime-pipecat."
requires-python = ">=3.11"
dependencies = [
  "websockets>=12.0",
  "pydantic>=2.6",
  "elevenlabs>=2.0",
]

[project.optional-dependencies]
# Pipecat services wired in Day 4. Kept optional so the mock sidecar runs
# without needing to resolve Pipecat's dependency tree.
pipecat = [
  "pipecat-ai[elevenlabs,silero,openai]>=0.0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["kith_runtime"]
